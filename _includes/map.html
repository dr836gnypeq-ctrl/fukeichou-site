<!-- 撮影地マップ -->
<section class="section" id="map">
<div class="container">
<h2 class="section-heading">全国の景勝地で撮影</h2>
<p class="section-lead">北海道から鹿児島まで、日本の四季を記録しています。</p>

<div class="map-wrapper" id="map-container">
  <div class="map-loading">地図を読み込んでいます...</div>
</div>

<p class="map-note">全国100箇所以上の景勝地で撮影。四季・時間帯あわせて150時間超の映像ライブラリ。</p>
<p class="map-source">地図データ出典：国土数値情報（国土交通省）</p>
</div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
(function(){
  var PIN='#136b5e';

  var locations=[
    {name:'新穂高',en:'Shinhotaka, Gifu',lat:36.28,lng:137.60},
    {name:'錦帯橋',en:'Kintaikyo, Yamaguchi',lat:34.17,lng:132.18},
    {name:'稲佐山',en:'Mt. Inasa, Nagasaki',lat:32.76,lng:129.85},
    {name:'桜島',en:'Sakurajima, Kagoshima',lat:31.58,lng:130.66},
    {name:'鳴沢',en:'Narusawa, Yamanashi',lat:35.43,lng:138.68},
    {name:'香嵐渓',en:'Korankei, Aichi',lat:35.12,lng:137.32},
    {name:'美瑛',en:'Biei, Hokkaido',lat:43.50,lng:142.45},
    {name:'船岡城址公園',en:'Funaoka, Miyagi',lat:38.05,lng:140.78},
    {name:'草津',en:'Kusatsu, Gunma',lat:36.62,lng:138.60},
    {name:'高田城址公園',en:'Takada, Niigata',lat:37.10,lng:138.25},
    {name:'金城ふ頭',en:'Kinjo, Nagoya',lat:35.04,lng:136.84},
    {name:'函館山',en:'Mt. Hakodate, Hokkaido',lat:41.76,lng:140.70},
    {name:'札幌',en:'Sapporo, Hokkaido',lat:43.06,lng:141.35},
    {name:'神威岬',en:'Cape Kamui, Hokkaido',lat:43.33,lng:140.35},
    {name:'美瑛（美田）',en:'Biei Mita, Hokkaido',lat:43.57,lng:142.47},
    {name:'知床',en:'Shiretoko, Hokkaido',lat:44.08,lng:145.10},
    {name:'野付半島',en:'Notsuke, Hokkaido',lat:43.53,lng:145.32},
    {name:'弟子屈',en:'Teshikaga, Hokkaido',lat:43.48,lng:144.46},
    {name:'青い池',en:'Blue Pond, Hokkaido',lat:43.46,lng:142.60},
    {name:'御前崎',en:'Omaezaki, Shizuoka',lat:34.60,lng:138.23},
    {name:'西伊豆',en:'Nishi-Izu, Shizuoka',lat:34.78,lng:138.78},
    {name:'三保松原',en:'Miho, Shizuoka',lat:35.01,lng:138.52},
    {name:'亀老山',en:'Kirosan, Ehime',lat:34.12,lng:133.00},
    {name:'倉敷',en:'Kurashiki, Okayama',lat:34.60,lng:133.77},
    {name:'天橋立',en:'Amanohashidate, Kyoto',lat:35.57,lng:135.18},
    {name:'大高森',en:'Otakamori, Miyagi',lat:38.37,lng:141.14},
    {name:'蔵王',en:'Zao, Miyagi',lat:38.17,lng:140.40},
    {name:'摩耶山',en:'Mt. Maya, Kobe',lat:34.73,lng:135.21},
    {name:'丸山千枚田',en:'Maruyama Senmaida, Mie',lat:33.96,lng:135.94},
    {name:'岡谷',en:'Okaya, Nagano',lat:36.05,lng:138.05},
    {name:'奥蓼科',en:'Oku-Tateshina, Nagano',lat:36.05,lng:138.35}
  ];

  var container=document.getElementById('map-container');
  var w=container.offsetWidth;
  var h=Math.min(w*1.4,750);

  var svg=d3.select('#map-container')
    .append('svg')
    .attr('viewBox','0 0 '+w+' '+h)
    .attr('preserveAspectRatio','xMidYMid meet')
    .style('width','100%')
    .style('height','auto');

  var projection=d3.geoMercator()
    .center([137,37.5])
    .scale(w*2.8)
    .translate([w/2,h/2]);

  var path=d3.geoPath().projection(projection);

  d3.json('https://raw.githubusercontent.com/K-Oxon/Japan-map-for-BI/main/data/administrative_area/prefecture/ja_prefecture_area.topojson')
    .then(function(data){
      d3.select('.map-loading').remove();

      var objName=Object.keys(data.objects)[0];
      var japan=topojson.feature(data,data.objects[objName]);

      svg.append('g')
        .selectAll('path')
        .data(japan.features)
        .enter()
        .append('path')
        .attr('d',path)
        .attr('fill','var(--paper-warm)')
        .attr('stroke','var(--border)')
        .attr('stroke-width',0.5);

      var tooltip=d3.select('#map-container')
        .append('div')
        .attr('class','map-tip')
        .style('display','none');

      var pins=svg.append('g').selectAll('.loc-pin')
        .data(locations)
        .enter()
        .append('g')
        .attr('class','loc-pin')
        .attr('transform',function(d){
          var p=projection([d.lng,d.lat]);
          return 'translate('+p[0]+','+p[1]+')';
        })
        .style('cursor','pointer');

      pins.append('circle')
        .attr('r',7)
        .attr('fill',PIN)
        .attr('fill-opacity',0.18)
        .attr('stroke',PIN)
        .attr('stroke-width',1.2);

      pins.append('circle')
        .attr('r',3)
        .attr('fill',PIN);

      pins.on('mouseenter',function(event,d){
        d3.select(this).select('circle:first-child')
          .transition().duration(200)
          .attr('r',12).attr('fill-opacity',0.35);
        d3.select(this).select('circle:last-child')
          .transition().duration(200)
          .attr('r',4.5);

        tooltip
          .style('display','block')
          .html('<strong>'+d.name+'</strong><br><span class="tip-en">'+d.en+'</span>');
      })
      .on('mousemove',function(event){
        var rect=container.getBoundingClientRect();
        var px=event.clientX-rect.left;
        var py=event.clientY-rect.top;
        var tipW=tooltip.node().offsetWidth;
        var left=px+16;
        if(left+tipW>w) left=px-tipW-16;
        tooltip.style('left',left+'px').style('top',(py-20)+'px');
      })
      .on('mouseleave',function(){
        d3.select(this).select('circle:first-child')
          .transition().duration(300)
          .attr('r',7).attr('fill-opacity',0.18);
        d3.select(this).select('circle:last-child')
          .transition().duration(300)
          .attr('r',3);
        tooltip.style('display','none');
      })
      .on('touchstart',function(event,d){
        event.preventDefault();
        var e=new Event('mouseenter');
        this.dispatchEvent(e);
        var self=this;
        var rect=container.getBoundingClientRect();
        var touch=event.touches[0];
        var moveEvt=new MouseEvent('mousemove',{clientX:touch.clientX,clientY:touch.clientY});
        this.dispatchEvent(moveEvt);
        setTimeout(function(){self.dispatchEvent(new Event('mouseleave'))},2500);
      });
    })
    .catch(function(err){
      d3.select('.map-loading').text('地図の読み込みに失敗しました');
      console.error('Map load error:',err);
    });
})();
</script>
