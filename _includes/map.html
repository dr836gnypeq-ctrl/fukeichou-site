<!-- 撮影地マップ -->
<section class="section" id="map">
<div class="container">
<h2 class="section-heading">全国の景勝地で撮影</h2>
<p class="section-lead">北海道から鹿児島まで、日本の四季を記録しています。</p>

<div class="map-wrapper" id="map-container">
  <div class="map-loading">地図を読み込んでいます...</div>
  <div class="map-video-popup" id="map-video-popup">
    <video id="map-popup-video" muted playsinline loop></video>
  </div>
</div>

<p class="map-note">全国100箇所以上の景勝地で撮影。四季・時間帯あわせて150時間超の映像ライブラリ。</p>
<p class="map-source">地図データ出典：国土数値情報（国土交通省）</p>
</div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
(function(){
  var PIN='#136b5e';
  var LABEL_BG='#fff';
  var LABEL_BORDER='#b8c2c7';
  var LABEL_TEXT='#333';
  var LINE_COLOR='#9aa5ab';
  var HOVER_COLOR='#136b5e';

  var base='{{ "/assets/images/" | relative_url }}';

  var locations=[
    {name:'新穂高',lat:36.28,lng:137.60,side:'L',video:'shinhotaka.mp4'},
    {name:'錦帯橋',lat:34.17,lng:132.18,side:'L',video:'kintaikyo.mp4'},
    {name:'長崎稲佐山',lat:32.76,lng:129.85,side:'L',video:'inasayama.mp4'},
    {name:'桜島',lat:31.58,lng:130.66,side:'R',video:'sakurajima.mp4'},
    {name:'紅葉台',lat:35.43,lng:138.68,side:'R',video:'narusawa.mp4'},
    {name:'香嵐渓',lat:35.12,lng:137.32,side:'L',video:'korankei.mp4'},
    {name:'船岡城址公園',lat:38.05,lng:140.78,side:'R',video:'funaoka.mp4'},
    {name:'高田城址公園',lat:37.10,lng:138.25,side:'L',video:'takada.mp4'},
    {name:'名古屋港',lat:35.04,lng:136.84,side:'L',video:'kinjo.mp4'},
    {name:'函館山',lat:41.76,lng:140.70,side:'L',video:'hakodate.mp4'},
    {name:'神威岬',lat:43.33,lng:140.35,side:'L',video:'kamui.mp4'},
    {name:'美瑛町',lat:43.50,lng:142.45,side:'L',video:'biei.mp4'},
    {name:'知床五湖',lat:44.08,lng:145.10,side:'R',video:'shiretoko.mp4'},
    {name:'野付半島',lat:43.53,lng:145.32,side:'R',video:'notsuke.mp4'},
    {name:'摩周湖',lat:43.48,lng:144.46,side:'R',video:'mashu.mp4'},
    {name:'御前崎',lat:34.60,lng:138.23,side:'R',video:'omaezaki.mp4'},
    {name:'堂ヶ島',lat:34.78,lng:138.78,side:'R',video:'dogashima.mp4'},
    {name:'三保松原',lat:35.01,lng:138.52,side:'R',video:'miho.mp4'},
    {name:'亀老山',lat:34.12,lng:133.00,side:'R',video:'kirosan.mp4'},
    {name:'水島展望台',lat:34.60,lng:133.77,side:'L',video:'mizushima.mp4'},
    {name:'天橋立',lat:35.57,lng:135.18,side:'L',video:'amanohashidate.mp4'},
    {name:'松島大高森',lat:38.37,lng:141.14,side:'R',video:'otakamori.mp4'},
    {name:'神戸掬星台',lat:34.73,lng:135.21,side:'L',video:'kikuseidai.mp4'},
    {name:'丸山千枚田',lat:33.96,lng:135.94,side:'R',video:'senmaida.mp4'},
    {name:'高ボッチ山',lat:36.05,lng:138.05,side:'L',video:'takabocchi.mp4'},
    {name:'御射鹿池',lat:36.05,lng:138.35,side:'R',video:'mishaka.mp4'},
    {name:'お台場',lat:35.63,lng:139.78,side:'R',video:'odaiba.mp4'},
    {name:'クリスマスツリーの木',lat:43.47,lng:142.55,side:'L',video:'christmas-tree.mp4'},
    {name:'河口湖',lat:35.51,lng:138.75,side:'R',video:'kawaguchiko.mp4'},
    {name:'白川ダム公園',lat:38.01,lng:139.96,side:'L',video:'shirakawa-dam.mp4'},
    {name:'釧路湿原',lat:43.10,lng:144.30,side:'R',video:'kushiro.mp4'},
    {name:'磐梯山',lat:37.60,lng:140.07,side:'L',video:'bandai.mp4'},
    {name:'白ひげの滝',lat:43.46,lng:142.60,side:'L',video:'shirahige.mp4'}
  ];

  var container=document.getElementById('map-container');
  var w=container.offsetWidth;
  var h=Math.min(w*1.5,820);
  var fs=w>500?8.5:7;
  var padX=6,padY=3;
  var labelH=fs+padY*2+2;
  var labelGap=labelH+3;

  var svg=d3.select('#map-container')
    .append('svg')
    .attr('viewBox','0 0 '+w+' '+h)
    .attr('preserveAspectRatio','xMidYMid meet')
    .style('width','100%')
    .style('height','auto');

  var projection=d3.geoMercator()
    .center([138,37.5])
    .scale(w*2.5)
    .translate([w/2,h/2]);

  var path=d3.geoPath().projection(projection);

  var popup=document.getElementById('map-video-popup');
  var popupVideo=document.getElementById('map-popup-video');

  function svgToContainer(svgX,svgY){
    var svgEl=container.querySelector('svg');
    if(!svgEl) return {x:0,y:0};
    return {x:(svgX/w)*svgEl.clientWidth, y:(svgY/h)*svgEl.clientHeight};
  }

  function showPopup(d){
    if(!d.video) return;
    popupVideo.src=base+'spots/'+d.video;
    popupVideo.play();
    popup.style.display='block';
    popup._currentName=d.name;
    var pos=svgToContainer(d._labelCx,d._labelCy);
    var popW=200,popH=113;
    var left=pos.x-popW/2;
    var top=pos.y-popH-12;
    var cw=container.querySelector('svg').clientWidth;
    if(left<4) left=4;
    if(left+popW>cw-4) left=cw-popW-4;
    if(top<4) top=pos.y+20;
    popup.style.left=left+'px';
    popup.style.top=top+'px';
  }

  function hidePopup(){
    popup.style.display='none';
    popup._currentName=null;
    popupVideo.pause();
    popupVideo.removeAttribute('src');
  }

  function resetLabel(el){
    el.select('rect').attr('fill',LABEL_BG).attr('stroke',LABEL_BORDER);
    el.select('text').attr('fill',LABEL_TEXT);
  }

  document.addEventListener('touchstart',function(e){
    if(!e.target.closest('.map-label') && popup.style.display==='block'){
      hidePopup();
      d3.selectAll('.map-label').each(function(){resetLabel(d3.select(this))});
    }
  });

  d3.json('https://raw.githubusercontent.com/K-Oxon/Japan-map-for-BI/main/data/administrative_area/prefecture/ja_prefecture_area.topojson')
    .then(function(data){
      d3.select('.map-loading').remove();

      var objName=Object.keys(data.objects)[0];
      var japan=topojson.feature(data,data.objects[objName]);

      svg.append('g')
        .selectAll('path')
        .data(japan.features)
        .enter()
        .append('path')
        .attr('d',path)
        .attr('fill','#dce4e6')
        .attr('stroke','#a0adb3')
        .attr('stroke-width',0.6);

      /* ── ピン座標を計算 ── */
      locations.forEach(function(d){
        var p=projection([d.lng,d.lat]);
        d._px=p[0]; d._py=p[1];
      });

      /* ── ラベルY座標を重ならないよう配置 ── */
      var leftGroup=locations.filter(function(d){return d.side==='L'});
      var rightGroup=locations.filter(function(d){return d.side==='R'});

      leftGroup.sort(function(a,b){return a._py-b._py});
      rightGroup.sort(function(a,b){return a._py-b._py});

      function assignLabelY(group){
        var lastY=-999;
        group.forEach(function(d){
          var idealY=d._py;
          if(idealY<lastY+labelGap) idealY=lastY+labelGap;
          d._labelY=idealY;
          lastY=idealY;
        });
      }

      assignLabelY(leftGroup);
      assignLabelY(rightGroup);

      /* ── ラベルX座標（左右の列位置） ── */
      var leftColX=8;
      var rightColEndX=w-8;

      /* ── 描画 ── */
      var gLines=svg.append('g');
      var gLabels=svg.append('g');
      var gPins=svg.append('g');

      locations.forEach(function(d){
        var x=d._px, y=d._py;
        var ly=d._labelY;

        /* テキスト幅推定 */
        var tw=0;
        for(var i=0;i<d.name.length;i++){
          tw+=(d.name.charCodeAt(i)>255)?fs:fs*0.55;
        }
        var bw=tw+padX*2;

        var bx,lx,midX;
        if(d.side==='L'){
          bx=leftColX;
          lx=bx+bw+3;
          midX=Math.min(x-10,lx+20);
        }else{
          bx=rightColEndX-bw;
          lx=bx-3;
          midX=Math.max(x+10,lx-20);
        }

        d._labelCx=bx+bw/2;
        d._labelCy=ly;

        /* 折れ線（pin → midpoint → label端） */
        gLines.append('polyline')
          .attr('points',x+','+y+' '+midX+','+ly+' '+lx+','+ly)
          .attr('fill','none')
          .attr('stroke',LINE_COLOR)
          .attr('stroke-width',0.6);

        /* ラベル枠 */
        var by=ly-labelH/2;

        var labelG=gLabels.append('g')
          .attr('class','map-label')
          .attr('data-name',d.name)
          .style('cursor','pointer');

        labelG.append('rect')
          .attr('x',bx).attr('y',by)
          .attr('width',bw).attr('height',labelH)
          .attr('rx',3).attr('ry',3)
          .attr('fill',LABEL_BG)
          .attr('stroke',LABEL_BORDER)
          .attr('stroke-width',0.8);

        labelG.append('text')
          .attr('x',bx+padX)
          .attr('y',ly+1)
          .attr('dominant-baseline','middle')
          .attr('fill',LABEL_TEXT)
          .attr('font-size',fs+'px')
          .attr('font-family','var(--sans)')
          .attr('font-weight','500')
          .text(d.name);

        /* ホバー */
        labelG.on('mouseenter',function(){
          d3.select(this).select('rect')
            .transition().duration(150)
            .attr('fill',HOVER_COLOR).attr('stroke',HOVER_COLOR);
          d3.select(this).select('text')
            .transition().duration(150)
            .attr('fill','#fff');
          showPopup(d);
        })
        .on('mouseleave',function(){
          resetLabel(d3.select(this));
          hidePopup();
        })
        .on('touchstart',function(event){
          event.preventDefault();
          event.stopPropagation();
          if(popup.style.display==='block' && popup._currentName===d.name){
            hidePopup();
            resetLabel(d3.select(this));
          }else{
            d3.selectAll('.map-label').each(function(){resetLabel(d3.select(this))});
            d3.select(this).select('rect').attr('fill',HOVER_COLOR).attr('stroke',HOVER_COLOR);
            d3.select(this).select('text').attr('fill','#fff');
            showPopup(d);
          }
        });

        /* ピン */
        gPins.append('circle')
          .attr('cx',x).attr('cy',y)
          .attr('r',2.5)
          .attr('fill',PIN).attr('fill-opacity',0.2)
          .attr('stroke',PIN).attr('stroke-width',0.8);
        gPins.append('circle')
          .attr('cx',x).attr('cy',y)
          .attr('r',1.2)
          .attr('fill',PIN);
      });

    })
    .catch(function(err){
      d3.select('.map-loading').text('地図の読み込みに失敗しました');
      console.error('Map load error:',err);
    });
})();
</script>
