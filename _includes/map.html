<!-- 撮影地マップ -->
<section class="section" id="map">
<div class="container">
<h2 class="section-heading">全国の景勝地で撮影</h2>
<p class="section-lead">北海道から鹿児島まで、日本の四季を記録しています。</p>

<div class="map-wrapper" id="map-container">
  <div class="map-loading">地図を読み込んでいます...</div>
  <div class="map-video-popup" id="map-video-popup">
    <video id="map-popup-video" muted playsinline loop></video>
  </div>
</div>

<p class="map-note">全国100箇所以上の景勝地で撮影。四季・時間帯あわせて150時間超の映像ライブラリ。</p>
<p class="map-source">地図データ出典：国土数値情報（国土交通省）</p>
</div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
(function(){
  var PIN='#136b5e';
  var LABEL_BG='#fff';
  var LABEL_BORDER='#b8c2c7';
  var LABEL_TEXT='#333';
  var LINE_COLOR='#9aa5ab';
  var HOVER_COLOR='#136b5e';
  var base='{{ "/assets/images/" | relative_url }}';

  /* Verified: zero overlap, zero crossing */
  var locations=[
    {name:'美瑛町',lat:43.5,lng:142.45,ldx:-107,ldy:-21,a:'e',video:'biei.mp4'},
    {name:'クリスマスツリーの木',lat:43.47,lng:142.55,ldx:-110,ldy:-4,a:'e',video:'christmas-tree.mp4'},
    {name:'白ひげの滝',lat:43.46,lng:142.6,ldx:-111,ldy:13,a:'e',video:'shirahige.mp4'},
    {name:'神威岬',lat:43.33,lng:140.35,ldx:-107,ldy:12,a:'e',video:'kamui.mp4'},
    {name:'函館山',lat:41.76,lng:140.7,ldx:-97,ldy:4,a:'e',video:'hakodate.mp4'},
    {name:'知床五湖',lat:44.08,lng:145.1,ldx:43,ldy:-16,a:'s',video:'shiretoko.mp4'},
    {name:'野付半島',lat:43.53,lng:145.32,ldx:36,ldy:-20,a:'s',video:'notsuke.mp4'},
    {name:'摩周湖',lat:43.48,lng:144.46,ldx:61,ldy:-4,a:'s',video:'mashu.mp4'},
    {name:'釧路湿原',lat:43.1,lng:144.3,ldx:66,ldy:-1,a:'s',video:'kushiro.mp4'},
    {name:'白川ダム公園',lat:38.01,lng:139.96,ldx:-66,ldy:-56,a:'e',video:'shirakawa-dam.mp4'},
    {name:'松島大高森',lat:38.37,lng:141.14,ldx:51,ldy:-25,a:'s',video:'otakamori.mp4'},
    {name:'船岡城址公園',lat:38.05,lng:140.78,ldx:61,ldy:-18,a:'s',video:'funaoka.mp4'},
    {name:'磐梯山',lat:37.6,lng:140.07,ldx:-69,ldy:-16,a:'e',video:'bandai.mp4'},
    {name:'高田城址公園',lat:37.1,lng:138.25,ldx:-87,ldy:-13,a:'e',video:'takada.mp4'},
    {name:'新穂高',lat:36.28,lng:137.6,ldx:-99,ldy:-17,a:'e',video:'shinhotaka.mp4'},
    {name:'高ボッチ山',lat:36.05,lng:138.05,ldx:-111,ldy:-8,a:'e',video:'takabocchi.mp4'},
    {name:'御射鹿池',lat:36.05,lng:138.35,ldx:110,ldy:-26,a:'s',video:'mishaka.mp4'},
    {name:'お台場',lat:35.63,lng:139.78,ldx:99,ldy:-20,a:'s',video:'odaiba.mp4'},
    {name:'河口湖',lat:35.51,lng:138.75,ldx:99,ldy:-7,a:'s',video:'kawaguchiko.mp4'},
    {name:'紅葉台',lat:35.43,lng:138.68,ldx:101,ldy:9,a:'s',video:'narusawa.mp4'},
    {name:'香嵐渓',lat:35.12,lng:137.32,ldx:-115,ldy:-18,a:'e',video:'korankei.mp4'},
    {name:'名古屋港',lat:35.04,lng:136.84,ldx:-101,ldy:-3,a:'e',video:'kinjo.mp4'},
    {name:'三保松原',lat:35.01,lng:138.52,ldx:105,ldy:12,a:'s',video:'miho.mp4'},
    {name:'堂ヶ島',lat:34.78,lng:138.78,ldx:98,ldy:22,a:'s',video:'dogashima.mp4'},
    {name:'御前崎',lat:34.6,lng:138.23,ldx:113,ldy:34,a:'s',video:'omaezaki.mp4'},
    {name:'天橋立',lat:35.57,lng:135.18,ldx:-100,ldy:-16,a:'e',video:'amanohashidate.mp4'},
    {name:'神戸掬星台',lat:34.73,lng:135.21,ldx:-101,ldy:4,a:'e',video:'kikuseidai.mp4'},
    {name:'水島展望台',lat:34.6,lng:133.77,ldx:-122,ldy:16,a:'e',video:'mizushima.mp4'},
    {name:'錦帯橋',lat:34.17,lng:132.18,ldx:-94,ldy:19,a:'e',video:'kintaikyo.mp4'},
    {name:'亀老山',lat:34.12,lng:133.0,ldx:82,ldy:32,a:'s',video:'kirosan.mp4'},
    {name:'丸山千枚田',lat:33.96,lng:135.94,ldx:79,ldy:42,a:'s',video:'senmaida.mp4'},
    {name:'長崎稲佐山',lat:32.76,lng:129.85,ldx:-62,ldy:16,a:'e',video:'inasayama.mp4'},
    {name:'桜島',lat:31.58,lng:130.66,ldx:89,ldy:3,a:'s',video:'sakurajima.mp4'}
  ];

  var container=document.getElementById('map-container');
  var w=container.offsetWidth;
  var h=Math.min(w*1.45,800);
  var fs=w>500?8.5:7;
  var padX=6,padY=3;
  var labelH=fs+padY*2+2;
  var sc=w/640;

  var svg=d3.select('#map-container')
    .append('svg')
    .attr('viewBox','0 0 '+w+' '+h)
    .attr('preserveAspectRatio','xMidYMid meet')
    .style('width','100%')
    .style('height','auto');

  var projection=d3.geoMercator()
    .center([138,37.5])
    .scale(w*2.55)
    .translate([w/2,h/2]);

  var path=d3.geoPath().projection(projection);
  var popup=document.getElementById('map-video-popup');
  var popupVideo=document.getElementById('map-popup-video');

  function svgToContainer(sx,sy){
    var el=container.querySelector('svg');
    if(!el) return {x:0,y:0};
    return {x:(sx/w)*el.clientWidth,y:(sy/h)*el.clientHeight};
  }
  function showPopup(d){
    if(!d.video) return;
    popupVideo.src=base+'spots/'+d.video;
    popupVideo.play();
    popup.style.display='block';
    popup._currentName=d.name;
    var pos=svgToContainer(d._labelCx,d._labelCy);
    var popW=200,popH=113;
    var left=pos.x-popW/2,top=pos.y-popH-12;
    var cw=container.querySelector('svg').clientWidth;
    if(left<4) left=4;
    if(left+popW>cw-4) left=cw-popW-4;
    if(top<4) top=pos.y+labelH+8;
    popup.style.left=left+'px';
    popup.style.top=top+'px';
  }
  function hidePopup(){
    popup.style.display='none';
    popup._currentName=null;
    popupVideo.pause();
    popupVideo.removeAttribute('src');
  }
  function resetLabel(el){
    el.select('rect').attr('fill',LABEL_BG).attr('stroke',LABEL_BORDER);
    el.select('text').attr('fill',LABEL_TEXT);
  }
  document.addEventListener('touchstart',function(e){
    if(!e.target.closest('.map-label')&&popup.style.display==='block'){
      hidePopup();
      d3.selectAll('.map-label').each(function(){resetLabel(d3.select(this))});
    }
  });

  d3.json('https://raw.githubusercontent.com/K-Oxon/Japan-map-for-BI/main/data/administrative_area/prefecture/ja_prefecture_area.topojson')
    .then(function(data){
      d3.select('.map-loading').remove();
      var objName=Object.keys(data.objects)[0];
      var japan=topojson.feature(data,data.objects[objName]);

      svg.append('g').selectAll('path').data(japan.features).enter().append('path')
        .attr('d',path).attr('fill','#dce4e6').attr('stroke','#a0adb3').attr('stroke-width',0.6);

      var gLines=svg.append('g');
      var gLabels=svg.append('g');
      var gPins=svg.append('g');

      locations.forEach(function(d){
        var p=projection([d.lng,d.lat]);
        var x=p[0],y=p[1];
        var ldx=d.ldx*sc,ldy=d.ldy*sc;
        var lx=x+ldx,ly=y+ldy;

        var tw=0;
        for(var i=0;i<d.name.length;i++) tw+=(d.name.charCodeAt(i)>255)?fs:fs*0.55;
        var bw=tw+padX*2;
        var bx=d.a==='s'?lx+2:lx-bw-2;
        var by=ly-labelH/2;
        var edgeX=d.a==='s'?bx:bx+bw;

        d._labelCx=bx+bw/2;
        d._labelCy=by;

        /* 折れ線: pin → bend → label */
        var bendX=x+(edgeX-x)*0.35;
        var bendY=y+(ly-y)*0.35;

        gLines.append('polyline')
          .attr('points',x+','+y+' '+bendX+','+bendY+' '+edgeX+','+ly)
          .attr('fill','none')
          .attr('stroke',LINE_COLOR)
          .attr('stroke-width',0.6);

        var labelG=gLabels.append('g')
          .attr('class','map-label')
          .attr('data-name',d.name)
          .style('cursor','pointer');

        labelG.append('rect')
          .attr('x',bx).attr('y',by)
          .attr('width',bw).attr('height',labelH)
          .attr('rx',3).attr('ry',3)
          .attr('fill',LABEL_BG)
          .attr('stroke',LABEL_BORDER)
          .attr('stroke-width',0.7);

        labelG.append('text')
          .attr('x',bx+padX).attr('y',ly+1)
          .attr('dominant-baseline','middle')
          .attr('fill',LABEL_TEXT)
          .attr('font-size',fs+'px')
          .attr('font-family','var(--sans)')
          .attr('font-weight','500')
          .text(d.name);

        labelG.on('mouseenter',function(){
          d3.select(this).select('rect').transition().duration(150)
            .attr('fill',HOVER_COLOR).attr('stroke',HOVER_COLOR);
          d3.select(this).select('text').transition().duration(150).attr('fill','#fff');
          showPopup(d);
        })
        .on('mouseleave',function(){
          resetLabel(d3.select(this));
          hidePopup();
        })
        .on('touchstart',function(event){
          event.preventDefault();event.stopPropagation();
          if(popup.style.display==='block'&&popup._currentName===d.name){
            hidePopup();resetLabel(d3.select(this));
          }else{
            d3.selectAll('.map-label').each(function(){resetLabel(d3.select(this))});
            d3.select(this).select('rect').attr('fill',HOVER_COLOR).attr('stroke',HOVER_COLOR);
            d3.select(this).select('text').attr('fill','#fff');
            showPopup(d);
          }
        });

        gPins.append('circle').attr('cx',x).attr('cy',y).attr('r',2.5)
          .attr('fill',PIN).attr('fill-opacity',0.2).attr('stroke',PIN).attr('stroke-width',0.8);
        gPins.append('circle').attr('cx',x).attr('cy',y).attr('r',1.2).attr('fill',PIN);
      });
    })
    .catch(function(err){
      d3.select('.map-loading').text('地図の読み込みに失敗しました');
      console.error('Map load error:',err);
    });
})();
</script>
