<!-- 凡例 -->
<div class="map-legend">

</div>
<p class="map-note">全国100箇所以上の景勝地で撮影。四季・時間帯あわせて150時間超の映像ライブラリ。</p>
</div>
</div>
</section>

<script>
(function(){
  /* 季節→色マッピング */
  var colors={
    '春':'#d4829c','夏':'#3d8b6e','秋':'#c47a2a','冬':'#5a8ab5','夜':'#7a6aad'
  };

  /* ピンに季節色を適用 */
  document.querySelectorAll('.pin').forEach(function(pin){
    var season=pin.getAttribute('data-season');
    var c=colors[season]||'#2d4a3e';
    pin.querySelectorAll('circle')[0].setAttribute('fill',c);
    pin.querySelectorAll('circle')[0].setAttribute('fill-opacity','0.3');
    pin.querySelectorAll('circle')[0].setAttribute('stroke',c);
    pin.querySelectorAll('circle')[0].setAttribute('stroke-width','1.5');
    pin.querySelectorAll('circle')[1].setAttribute('fill',c);
  });

  /* ツールチップ制御 */
  var tooltip=document.querySelector('.map-tooltip');
  var bg=tooltip.querySelector('.tooltip-bg');
  var nameEl=tooltip.querySelector('.tooltip-name');
  var detailEl=tooltip.querySelector('.tooltip-detail');

  document.querySelectorAll('.pin').forEach(function(pin){
    pin.addEventListener('mouseenter',function(e){
      var name=pin.getAttribute('data-name');
      var en=pin.getAttribute('data-en');
      var season=pin.getAttribute('data-season');
      var cx=parseFloat(pin.querySelector('circle').getAttribute('cx'));
      var cy=parseFloat(pin.querySelector('circle').getAttribute('cy'));

      nameEl.textContent=name;
      detailEl.textContent=en+'  |  '+season;

      /* テキスト幅の推定 */
      var w=Math.max(name.length*16, en.length*8+40)+24;
      var h=48;

      /* 画面端の場合は左に表示 */
      var tx=cx+15;
      if(tx+w>560) tx=cx-w-15;
      var ty=cy-h/2;
      if(ty<10) ty=10;

      bg.setAttribute('x',tx);
      bg.setAttribute('y',ty);
      bg.setAttribute('width',w);
      bg.setAttribute('height',h);

      nameEl.setAttribute('x',tx+12);
      nameEl.setAttribute('y',ty+h/2);
      detailEl.setAttribute('x',tx+12);
      detailEl.setAttribute('y',ty+h/2);

      tooltip.style.display='block';
    });

    pin.addEventListener('mouseleave',function(){
      tooltip.style.display='none';
    });

    /* モバイル対応 */
    pin.addEventListener('touchstart',function(e){
      e.preventDefault();
      pin.dispatchEvent(new Event('mouseenter'));
      setTimeout(function(){pin.dispatchEvent(new Event('mouseleave'))},2500);
    });
  });
})();
</script>
