<!-- 撮影地マップ -->
<section class="section" id="map">
<div class="container">
<h2 class="section-heading">全国の景勝地で撮影</h2>
<p class="section-lead">北海道から鹿児島まで、日本の四季を記録しています。</p>

<div class="map-wrapper" id="map-container">
  <div class="map-loading">地図を読み込んでいます...</div>
</div>

<p class="map-note">全国100箇所以上の景勝地で撮影。四季・時間帯あわせて150時間超の映像ライブラリ。</p>
<p class="map-source">地図データ出典：国土数値情報（国土交通省）</p>
</div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
(function(){
  var PIN='#136b5e';
  var LABEL_COLOR='#444';
  var LINE_COLOR='#aaa';

  /* 各ピンのラベルオフセット [dx, dy, anchor]
     anchor: 's'=start(左寄せ), 'e'=end(右寄せ) */
  var locations=[
    {name:'知床',en:'Shiretoko',lat:44.08,lng:145.10,  ldx:20,ldy:-8,a:'s'},
    {name:'野付半島',en:'Notsuke',lat:43.53,lng:145.32, ldx:22,ldy:12,a:'s'},
    {name:'弟子屈',en:'Teshikaga',lat:43.48,lng:144.46, ldx:-25,ldy:15,a:'e'},
    {name:'美瑛',en:'Biei',lat:43.50,lng:142.45,        ldx:-30,ldy:-5,a:'e'},
    {name:'青い池',en:'Blue Pond',lat:43.46,lng:142.60,  ldx:-28,ldy:15,a:'e'},
    {name:'美田',en:'Biei Mita',lat:43.57,lng:142.47,    ldx:-30,ldy:-18,a:'e'},
    {name:'札幌',en:'Sapporo',lat:43.06,lng:141.35,      ldx:-28,ldy:5,a:'e'},
    {name:'神威岬',en:'Cape Kamui',lat:43.33,lng:140.35, ldx:-25,ldy:-10,a:'e'},
    {name:'函館山',en:'Mt. Hakodate',lat:41.76,lng:140.70, ldx:-30,ldy:10,a:'e'},

    {name:'船岡城址',en:'Funaoka',lat:38.05,lng:140.78,  ldx:22,ldy:-5,a:'s'},
    {name:'大高森',en:'Otakamori',lat:38.37,lng:141.14,   ldx:20,ldy:5,a:'s'},
    {name:'蔵王',en:'Zao',lat:38.17,lng:140.40,           ldx:-25,ldy:0,a:'e'},

    {name:'草津',en:'Kusatsu',lat:36.62,lng:138.60,       ldx:22,ldy:-5,a:'s'},
    {name:'高田城址',en:'Takada',lat:37.10,lng:138.25,     ldx:-28,ldy:0,a:'e'},

    {name:'岡谷',en:'Okaya',lat:36.05,lng:138.05,         ldx:-26,ldy:-10,a:'e'},
    {name:'奥蓼科',en:'Oku-Tateshina',lat:36.05,lng:138.35, ldx:22,ldy:-12,a:'s'},
    {name:'鳴沢',en:'Narusawa',lat:35.43,lng:138.68,      ldx:22,ldy:5,a:'s'},
    {name:'新穂高',en:'Shinhotaka',lat:36.28,lng:137.60,   ldx:-28,ldy:5,a:'e'},

    {name:'金城ふ頭',en:'Kinjo',lat:35.04,lng:136.84,     ldx:-28,ldy:12,a:'e'},
    {name:'香嵐渓',en:'Korankei',lat:35.12,lng:137.32,    ldx:22,ldy:-8,a:'s'},

    {name:'御前崎',en:'Omaezaki',lat:34.60,lng:138.23,    ldx:22,ldy:8,a:'s'},
    {name:'西伊豆',en:'Nishi-Izu',lat:34.78,lng:138.78,   ldx:22,ldy:-5,a:'s'},
    {name:'三保松原',en:'Miho',lat:35.01,lng:138.52,       ldx:22,ldy:5,a:'s'},

    {name:'天橋立',en:'Amanohashidate',lat:35.57,lng:135.18, ldx:-28,ldy:-8,a:'e'},
    {name:'摩耶山',en:'Mt. Maya',lat:34.73,lng:135.21,    ldx:-28,ldy:8,a:'e'},

    {name:'倉敷',en:'Kurashiki',lat:34.60,lng:133.77,     ldx:-25,ldy:-8,a:'e'},
    {name:'亀老山',en:'Kirosan',lat:34.12,lng:133.00,      ldx:22,ldy:10,a:'s'},
    {name:'錦帯橋',en:'Kintaikyo',lat:34.17,lng:132.18,   ldx:-25,ldy:-8,a:'e'},
    {name:'丸山千枚田',en:'Senmaida',lat:33.96,lng:135.94, ldx:22,ldy:12,a:'s'},

    {name:'稲佐山',en:'Mt. Inasa',lat:32.76,lng:129.85,   ldx:-28,ldy:-5,a:'e'},
    {name:'桜島',en:'Sakurajima',lat:31.58,lng:130.66,     ldx:22,ldy:5,a:'s'}
  ];

  var container=document.getElementById('map-container');
  var w=container.offsetWidth;
  var h=Math.min(w*1.4,750);

  var svg=d3.select('#map-container')
    .append('svg')
    .attr('viewBox','0 0 '+w+' '+h)
    .attr('preserveAspectRatio','xMidYMid meet')
    .style('width','100%')
    .style('height','auto');

  var projection=d3.geoMercator()
    .center([137,37.5])
    .scale(w*2.8)
    .translate([w/2,h/2]);

  var path=d3.geoPath().projection(projection);

  d3.json('https://raw.githubusercontent.com/K-Oxon/Japan-map-for-BI/main/data/administrative_area/prefecture/ja_prefecture_area.topojson')
    .then(function(data){
      d3.select('.map-loading').remove();

      var objName=Object.keys(data.objects)[0];
      var japan=topojson.feature(data,data.objects[objName]);

      /* 地図描画 — コントラスト強化 */
      svg.append('g')
        .selectAll('path')
        .data(japan.features)
        .enter()
        .append('path')
        .attr('d',path)
        .attr('fill','#e8edee')
        .attr('stroke','#b0bec5')
        .attr('stroke-width',0.6);

      /* ラベルの線 */
      var labels=svg.append('g').attr('class','map-labels');

      locations.forEach(function(d){
        var p=projection([d.lng,d.lat]);
        var x=p[0], y=p[1];
        var lx=x+d.ldx, ly=y+d.ldy;

        /* 線 */
        labels.append('line')
          .attr('x1',x).attr('y1',y)
          .attr('x2',lx).attr('y2',ly)
          .attr('stroke',LINE_COLOR)
          .attr('stroke-width',0.7);

        /* ラベルテキスト */
        labels.append('text')
          .attr('x',d.a==='s'?lx+4:lx-4)
          .attr('y',ly)
          .attr('text-anchor',d.a==='s'?'start':'end')
          .attr('dominant-baseline','middle')
          .attr('fill',LABEL_COLOR)
          .attr('font-size', w>500?'8.5px':'7px')
          .attr('font-family','var(--sans)')
          .text(d.name);
      });

      /* ピン */
      var pins=svg.append('g');

      locations.forEach(function(d){
        var p=projection([d.lng,d.lat]);

        pins.append('circle')
          .attr('cx',p[0]).attr('cy',p[1])
          .attr('r',3.5)
          .attr('fill',PIN)
          .attr('fill-opacity',0.2)
          .attr('stroke',PIN)
          .attr('stroke-width',1);

        pins.append('circle')
          .attr('cx',p[0]).attr('cy',p[1])
          .attr('r',2)
          .attr('fill',PIN);
      });

    })
    .catch(function(err){
      d3.select('.map-loading').text('地図の読み込みに失敗しました');
      console.error('Map load error:',err);
    });
})();
</script>
