<style>
/* Evidence page shared styles */
.ev-hero{padding:160px 0 80px;background:linear-gradient(135deg,#0a3a35 0%,#0d2825 50%,#0a2530 100%);color:var(--white);text-align:center}
.ev-hero .section-heading{color:var(--white);font-size:2.2rem;margin-bottom:16px}
.ev-hero .section-lead{color:rgba(255,255,255,.75);margin-bottom:0}
.ev-back{display:inline-flex;align-items:center;gap:8px;font-size:1rem;font-weight:500;color:rgba(255,255,255,.85);margin-bottom:28px;padding:10px 20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;transition:all .3s}
.ev-back:hover{color:#fff;background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35)}
/* Bottom navigation */
.ev-bottom-nav{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:48px;padding-top:40px;border-top:1px solid var(--border)}
.ev-bottom-nav a{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;font-size:.95rem;font-weight:500;border-radius:8px;border:1px solid var(--border);color:var(--ink-light);background:var(--white);transition:all .25s}
.ev-bottom-nav a:hover{color:var(--moss);border-color:var(--moss);background:var(--paper-warm);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.ev-highlights{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:-40px auto 0;max-width:var(--max-w);position:relative;z-index:2}
.ev-hl-card{padding:32px 24px;text-align:center;background:var(--white);border:1px solid var(--border)}
.ev-hl-card:first-child{border-radius:12px 0 0 12px}
.ev-hl-card:last-child{border-radius:0 12px 12px 0}
.ev-hl-num{font-family:var(--serif);font-size:2rem;font-weight:700;color:var(--moss);line-height:1.2}
.ev-hl-label{font-size:.85rem;color:var(--ink-light);margin-top:4px}

.ev-section-sub{font-family:var(--serif);font-size:1.3rem;font-weight:600;margin-bottom:8px;padding-top:16px}
.feature-card:hover{box-shadow:none}
.ev-section-desc{font-size:.95rem;color:var(--ink-light);margin-bottom:32px;line-height:1.8}
.ev-theory-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:32px}
.ev-theory-card{padding:28px 24px;border-left:3px solid var(--moss);background:var(--white);border-radius:0 8px 8px 0}
.ev-theory-card h4{font-family:var(--serif);font-size:.95rem;font-weight:600;margin-bottom:8px}
.ev-theory-card p{font-size:.85rem;color:var(--ink-light);line-height:1.8}
.ev-theory-card .ev-theory-author{font-size:.75rem;color:var(--ink-faint);margin-top:8px}
.ev-refs{counter-reset:ref}
.ev-ref-item{padding:12px 0;border-bottom:1px solid var(--border);font-size:.85rem;line-height:1.7;color:var(--ink-light);display:flex;gap:12px}
.ev-ref-item::before{counter-increment:ref;content:counter(ref)".";font-weight:600;color:var(--ink-faint);min-width:24px;flex-shrink:0}
.ev-ref-item a{color:var(--moss);font-size:.8rem;word-break:break-all}
.ev-cta{text-align:center;padding:48px 24px;background:var(--moss);border-radius:12px;color:var(--white);margin-top:24px}
.ev-cta p{font-size:1rem;margin-bottom:20px;opacity:.9}
.ev-cta .btn{background:var(--white);color:var(--moss);font-weight:600}
.ev-cta .btn:hover{background:rgba(255,255,255,.9);color:var(--moss);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.ev-cta-sub{font-size:.8rem;opacity:.65;margin-top:10px}
.ev-cta-link{color:rgba(255,255,255,.9);text-decoration:underline;font-size:.85rem}
.ev-cta-link:hover{color:#fff}
.ev-disclaimer{font-size:.8rem;color:var(--ink-faint);line-height:1.8;margin-top:48px;padding-top:24px;border-top:1px solid var(--border)}
/* Routing page cards */
.ev-route-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px;max-width:860px;margin-left:auto;margin-right:auto}
.ev-route-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:36px 28px;text-align:left;transition:transform .3s,box-shadow .3s;display:flex;flex-direction:column;text-decoration:none;color:var(--ink)}
.ev-route-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.ev-route-icon{display:none}
.ev-cat-pill{display:inline-block;font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:16px;letter-spacing:.02em}
.ev-cat-pill--clinic{background:#e1f5ee;color:#0f6e56}
.ev-cat-pill--mental{background:#eee8fd;color:#5340b5}
.ev-cat-pill--care{background:#faeeda;color:#854f0b}
.ev-route-card h3{font-family:var(--serif);font-size:1.35rem;font-weight:600;margin-bottom:12px;line-height:1.45}
.ev-route-card p{font-size:.88rem;color:var(--ink-light);line-height:1.8;margin-bottom:24px;flex:1}
.ev-route-card .btn{width:100%}
@media(max-width:768px){
.ev-highlights{grid-template-columns:1fr;margin-top:-24px}
.ev-hl-card{border-radius:0!important}
.ev-hl-card:first-child{border-radius:12px 12px 0 0!important}
.ev-hl-card:last-child{border-radius:0 0 12px 12px!important}
.ev-theory-grid{grid-template-columns:1fr}
.ev-hero{padding:120px 0 60px}
.ev-hero .section-heading{font-size:1.6rem}
.ev-route-grid{grid-template-columns:1fr;max-width:420px}
}

/* ページ内ガイドナビ */
.ev-page-nav{
  position:sticky;
  top:var(--header-h);
  z-index:900;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:0;
}
.ev-page-nav-inner{
  max-width:var(--max-w);
  margin:0 auto;
  padding:0 16px;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  gap:4px;
  align-items:center;
  height:44px;
  -webkit-overflow-scrolling:touch;
}
.ev-page-nav-inner::-webkit-scrollbar{display:none}
.ev-page-nav .h-pill{
  font-size:.75rem;
  padding:4px 11px;
  flex-shrink:0;
}
/* evidence ページはスクロール着地位置をナビ2段分ずらす */
.ev-scroll-offset{scroll-padding-top:calc(var(--header-h) + 44px)}
</style>

<script>
(function(){
  document.addEventListener('DOMContentLoaded',function(){
    var nav = document.querySelector('.ev-page-nav');
    if(!nav) return;
    document.documentElement.classList.add('ev-scroll-offset');
    var pills = nav.querySelectorAll('.h-pill[data-section]');
    var ids = Array.from(pills).map(function(p){return p.dataset.section});
    var sections = ids.map(function(id){return document.getElementById(id)}).filter(Boolean);
    var offset = (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--header-h'))||72) + 44 + 8;

    function getActive(){
      var scrollY = window.scrollY || window.pageYOffset;
      var active = ids[0];
      for(var i=0;i<sections.length;i++){
        if(sections[i] && sections[i].getBoundingClientRect().top + scrollY - offset <= scrollY){
          active = ids[i];
        }
      }
      return active;
    }

    function updatePills(){
      var active = getActive();
      pills.forEach(function(p){
        p.classList.toggle('active', p.dataset.section === active);
      });
      /* アクティブピルをスクロール位置に追従 */
      var activePill = nav.querySelector('.h-pill.active');
      if(activePill){
        var inner = nav.querySelector('.ev-page-nav-inner');
        var left = activePill.offsetLeft - inner.offsetWidth/2 + activePill.offsetWidth/2;
        inner.scrollTo({left:left, behavior:'smooth'});
      }
    }

    window.addEventListener('scroll', updatePills, {passive:true});
    updatePills();
  });
})();
</script>
