<section class="hero" id="hero">
<img src="{{ '/assets/images/hero-fallback.jpg' | relative_url }}" alt="" class="hero-fallback">
<video class="hero-video" id="hero-video" autoplay loop muted playsinline preload="none" poster="{{ '/assets/images/hero-fallback.jpg' | relative_url }}">
</video>
<script>
(function(){
  var v=document.getElementById('hero-video');
  var base='{{ "/assets/images/" | relative_url }}';
  /* iPadOS 13+はnavigator.userAgentが"Macintosh"になるため maxTouchPoints で判定 */
  var ua=navigator.userAgent;
  var isIpad=/iPad/.test(ua)||(navigator.maxTouchPoints>1&&/Macintosh/.test(ua));
  if(window.innerWidth<=768||isIpad){
    /* iPhone・Android・iPad → 22MB H.264 1080p (AV1非対応デバイスに確実に届く) */
    v.innerHTML='<source src="'+base+'hero-mobile.mp4" type="video/mp4">';
  }else{
    /* デスクトップ → AV1優先 + H.264フォールバック */
    v.innerHTML='<source src="'+base+'hero-pc.mp4" type=\'video/mp4; codecs="av01.0.12M.10"\'>'
              +'<source src="'+base+'hero-pc-fallback.mp4" type="video/mp4">';
  }
  v.load();
  v.play().catch(function(){});
})();
</script>
<div class="hero-overlay"></div>
<div class="hero-content">
<h1 class="hero-title">過ごす場所に、<br>日本の風景を</h1>
<p class="hero-subtitle">日本の四季、本物の光。<br>待合室に、静かな時間を届けます。</p>
<div class="hero-actions">
<a href="#contact" class="btn btn-primary btn-lg">導入のご相談</a>
<a href="#service" class="btn btn-ghost">詳しく見る</a>
</div>
</div>
</section>
