<section class="hero" id="hero">
<img src="{{ '/assets/images/hero-fallback.jpg' | relative_url }}" alt="日本の自然風景 4K実写映像 — 待合室・介護施設向け風景帖" class="hero-fallback">
<video class="hero-video" id="hero-video" autoplay loop muted playsinline preload="none" poster="{{ '/assets/images/hero-fallback.jpg' | relative_url }}">
</video>
<script>
(function(){
  var v=document.getElementById('hero-video');
  var base='{{ "/assets/images/" | relative_url }}';
  /* iPadOS 13+はnavigator.userAgentが"Macintosh"になるため maxTouchPoints で判定 */
  var ua=navigator.userAgent;
  var isIpad=/iPad/.test(ua)||(navigator.maxTouchPoints>1&&/Macintosh/.test(ua));
  if(window.innerWidth<=768||isIpad){
    /* iPhone・Android・iPad → 22MB H.264 1080p (AV1非対応デバイスに確実に届く) */
    v.innerHTML='<source src="'+base+'hero-mobile.mp4" type="video/mp4">';
  }else{
    /* デスクトップ → AV1優先 + H.264フォールバック */
    v.innerHTML='<source src="'+base+'hero-pc.mp4" type=\'video/mp4; codecs="av01.0.12M.10"\'>'
              +'<source src="'+base+'hero-pc-fallback.mp4" type="video/mp4">';
  }
  v.load();
  v.play().catch(function(){});
})();
</script>
<div class="hero-overlay"></div>
<div class="hero-content">
<p class="hero-tagline">クリニック・歯科・介護施設向け 映像サブスク</p>
<h1 class="hero-title">過ごす場所に<br>本物の風景を</h1>
<p class="hero-subtitle">移ろう四季、実在する光<br>もうひとつの、窓</p>
<div class="hero-actions">
<a href="#contact" class="btn btn-hero-cta">導入のご相談</a>
</div>
</div>
<a href="#pain" class="hero-scroll-indicator" aria-label="次のセクションへ">
<svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 11L14 18L21 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</a>
</section>
